<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Utopie</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#111;
    color:white;
}

header{
    text-align:center;
    padding:40px;
    background:#1c1c1c;
}

h1{
    margin:0;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:#222;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:15px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:999;
    overflow:auto;
}

.modal-content{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.modal img{
    width:100%;
    border-radius:15px;
}

.text-box{
    margin-top:20px;
    background:#222;
    padding:20px;
    border-radius:12px;
    line-height:1.6;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<header>
    <h1>Mijn Utopie</h1>
    <p>Klik op een afbeelding om meer te lezen.</p>
</header>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <img id="modalImage">
        <div class="text-box" id="modalText">
            Laden...
        </div>
    </div>
</div>

<script>

const gallery = document.getElementById("gallery");
const modal = document.getElementById("modal");
const modalImage = document.getElementById("modalImage");
const modalText = document.getElementById("modalText");

fetch("gallery.json")
.then(res => res.json())
.then(images => {

    images.forEach(file => {

        const name = file.split(".")[0];

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="images/${file}">
            <h3>${name}</h3>
        `;

        card.onclick = async () => {

            modal.style.display = "block";
            modalImage.src = `images/${file}`;

            try{
                const text = await fetch(`texts/${name}.txt`);
                modalText.textContent = await text.text();
            }catch{
                modalText.textContent =
                    "Geen tekstbestand gevonden.";
            }
        };

        gallery.appendChild(card);
    });

});

modal.onclick = () => {
    modal.style.display = "none";
};

</script>

</body>
</html>

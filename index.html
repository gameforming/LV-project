<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Utopie</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#111;
            color:white;
            text-align:center;
        }

        header{
            padding:80px 20px;
        }

        h1{
            font-size:4rem;
        }

        .container{
            max-width:1200px;
            margin:auto;
            padding:20px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-top:40px;
        }

        .card{
            background:#222;
            padding:30px;
            border-radius:15px;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card a{
            text-decoration:none;
            color:white;
            font-size:1.2rem;
            font-weight:bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Mijn Utopie</h1>
    <p>Een wereld waarin mens, natuur en technologie samenleven.</p>
</header>

<div class="container">

    <div class="grid">

        <div class="card">
            <a href="idee.html">in korte lijnen het idee</a>
        </div>

        <div class="card">
            <a href="district.html">uitleg districten</a>
        </div>


    </div>

</div>

</body>
</html>
